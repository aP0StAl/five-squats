<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Five Squats Logo Options</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8faf7;
        --ink: #171717;
        --muted: #5f6868;
        --line: #d9e2df;
        --panel: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      main {
        width: min(100%, 1040px);
        margin: 0 auto;
        padding: 28px 16px 40px;
      }

      h1 {
        margin: 0;
        font-size: 2.2rem;
        line-height: 1.05;
      }

      .intro {
        max-width: 640px;
        margin: 10px 0 24px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 16px;
      }

      figure {
        margin: 0;
        padding: 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        border-radius: 8px;
      }

      figcaption {
        margin-top: 10px;
        font-weight: 800;
      }

      .note {
        margin-top: 24px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Five Squats</h1>
      <p class="intro">Десять направлений для иконки. Выбери номер, который ближе по настроению, и я доведу его до финальной версии.</p>

      <section class="grid" aria-label="Варианты логотипа">
        <figure>
          <img src="assets/logo-01-step-stack.svg" alt="Вариант 1">
          <figcaption>01 Step Stack</figcaption>
        </figure>
        <figure>
          <img src="assets/logo-02-five-mark.svg" alt="Вариант 2">
          <figcaption>02 Five Mark</figcaption>
        </figure>
        <figure>
          <img src="assets/logo-03-clock-squats.svg" alt="Вариант 3">
          <figcaption>03 Clock</figcaption>
        </figure>
        <figure>
          <img src="assets/logo-04-rep-rings.svg" alt="Вариант 4">
          <figcaption>04 Rings</figcaption>
        </figure>
        <figure>
          <img src="assets/logo-05-movement-line.svg" alt="Вариант 5">
          <figcaption>05 Motion</figcaption>
        </figure>
        <figure>
          <img src="assets/logo-06-check-five.svg" alt="Вариант 6">
          <figcaption>06 Check</figcaption>
        </figure>
        <figure>
          <img src="assets/logo-07-hour-blocks.svg" alt="Вариант 7">
          <figcaption>07 Blocks</figcaption>
        </figure>
        <figure>
          <img src="assets/logo-08-leg-mark.svg" alt="Вариант 8">
          <figcaption>08 Squat Mark</figcaption>
        </figure>
        <figure>
          <img src="assets/logo-09-bold-5.svg" alt="Вариант 9">
          <figcaption>09 Bold 5</figcaption>
        </figure>
        <figure>
          <img src="assets/logo-10-calendar-reps.svg" alt="Вариант 10">
          <figcaption>10 Calendar</figcaption>
        </figure>
      </section>

      <p class="note">Текущая иконка приложения пока не изменена.</p>
    </main>
  </body>
</html>
